[tool.poetry]
name = "lclstream_api"
version = "0.7.0"
description = "Image streaming API for psana."
authors = ["Cong Wang <wangimagine@gmail.com>",
           "David M. Rogers <predictivestatmech@gmail.com>",
           "Valerio Mariani <valmar@slac.stanford.edu>"
          ]
license = "MIT"
readme = "README.md"

[tool.poetry.dependencies]
python = ">=3.9,<4.0"
fastapi = ">=0.103.2"
pydantic = ">=2.1"
uvicorn = ">=0.17"
psik = "^2.1.0"
lclstream = {git = "https://github.com/lcls-users/lclstream.git"}

[tool.poetry.group.dev.dependencies]
pytest = "^8.2.2"
httpx = "^0.27.2"
pytest-asyncio = "^1.2.0"
mpi4py = "^4.1.0"
mypy = "^1.18.2"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
