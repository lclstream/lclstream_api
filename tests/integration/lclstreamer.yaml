source_identifier: ""
skip_incomplete_events: false

event_source:
   type: "InternalEventSource"
   number_of_events_to_generate: 1001

data_sources:
   random:
      type: "GenericRandomNumpyArray"
      array_shape: 20, 2
      array_dtype: "float32"
      always_random: True
   const_data:
      type: ConstValue
      value: 3.14
      dtype: float64

processing_pipeline:
    type: "BatchProcessingPipeline"
    batch_size: 10

data_serializer:
    type: "HDF5BinarySerializer"
    compression_level: 3
    compression: "zfp"
    #fields:
    #  random: "/data/random"
    #  const_data: "/data/const"

data_handlers:
  - type: "BinaryDataStreamingDataHandler"
    urls: [ "tcp://127.0.0.1:12321" ]
    distribute: False
    buffer: 0
